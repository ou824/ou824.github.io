<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>圆的世界 - 几何定理动态演示与趣味挑战</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Noto Sans', system-ui, sans-serif;
            background: linear-gradient(145deg, #e7f0fd 0%, #d4e4fc 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .master-card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 20px 24px 28px 24px;
        }

        .hero {
            text-align: center;
            margin-bottom: 20px;
        }
        .hero h1 {
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(135deg, #1e3c72, #2b4e8f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .hero p {
            color: #2c3e66;
            font-weight: 500;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .canvas-container {
            flex: 2;
            min-width: 520px;
            background: #fefef7;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 6px 14px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
        }
        .game-panel {
            width: 500px;
            height: 500px;
            background: #fffaf2;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 6px 14px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .controls-area {
            flex: 1.2;
            min-width: 280px;
            background: #f8faffdd;
            backdrop-filter: blur(4px);
            border-radius: 36px;
            padding: 18px 20px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #cddfed;
            padding-bottom: 12px;
        }
        .tab-btn {
            background: #eef3fc;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #1e4663;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .tab-btn.active {
            background: #2b5f8a;
            color: white;
            box-shadow: 0 4px 10px rgba(43,95,138,0.3);
        }
        .tab-btn:hover:not(.active) {
            background: #d9e6f5;
            transform: translateY(-2px);
        }

        .ctrl-panel {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            padding: 18px 16px;
            margin-top: 8px;
        }
        .ctrl-group {
            margin-bottom: 20px;
        }
        .ctrl-group label {
            font-weight: 600;
            color: #1f4970;
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #2b5f8a;
        }
        .value-display {
            background: #eef2f9;
            border-radius: 32px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            margin-top: 6px;
            color: #0b3b5f;
        }
        .theorem-note {
            background: #e6f0fa;
            border-left: 6px solid #2b5f8a;
            padding: 12px 14px;
            border-radius: 24px;
            font-size: 0.8rem;
            margin-top: 20px;
            color: #1f3b4c;
        }
        .game-stats {
            display: flex;
            justify-content: space-between;
            background: #fffaec;
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .question-box {
            background: #ffffffdb;
            border-radius: 32px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        .opt-btn {
            background: #eef2fa;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .opt-btn:hover {
            background: #cbdff0;
            transform: scale(0.97);
        }
        .game-btn {
            background: #2b5f8a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        .score-time {
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 18px;
            color: #5c6f87;
        }
        @media (max-width: 850px) {
            .canvas-container { min-width: 380px; }
            canvas, .game-panel { width: 380px; height: 380px; }
        }
    </style>
</head>
<body>
<div class="master-card">
    <div class="hero">
        <h1>📐 圆的奇幻实验室 ⚡</h1>
        <p>动态探究 · 几何定理 · 趣味闯关</p>
    </div>
    <div class="dashboard">
        <div class="canvas-container">
            <canvas id="mainCanvas" width="500" height="500" style="width:500px;height:500px"></canvas>
            <div id="gameContainer" class="game-panel" style="display: none;"></div>
        </div>
        <div class="controls-area">
            <div class="tabs">
                <button class="tab-btn active" data-tab="prop">🔵 圆的性质</button>
                <button class="tab-btn" data-tab="angle">📐 圆周角定理</button>
                <button class="tab-btn" data-tab="tangent">✂️ 切线性质判定</button>
                <button class="tab-btn" data-tab="circles">🔄 圆与圆位置</button>
                <button class="tab-btn" data-tab="sector">🍕 弧长&扇形面积</button>
                <button class="tab-btn" data-tab="game">🎮 极限挑战·游戏</button>
            </div>
            <div id="dynamicControls" class="ctrl-panel"></div>
        </div>
    </div>
    <footer>⚡ 拖动滑块动态探究 | 游戏限时30秒，共10题，答对+10分，答错不扣分，挑战你的圆知识！</footer>
</div>

<script>
    (function(){
        // ----- 画布元素 -----
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');
        
        // 全局状态
        let currentTab = "prop";
        let state = {
            radius: 120,
            angleC: 80,
            fixedA: 30,
            fixedB: 150,
            tangentDist: 180,
            tangentAngle: 45,
            r1: 90,
            r2: 70,
            center2Offset: 130,
            sectorAngle: 120,
            sectorRadius: 130,
        };
        
        const centerX = 250, centerY = 250;
        
        // 辅助绘图函数
        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = "#e9ecef";
            ctx.lineWidth = 0.5;
            for(let i=0; i<=500; i+=25){
                ctx.beginPath();
                ctx.moveTo(i,0);
                ctx.lineTo(i,500);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0,i);
                ctx.lineTo(500,i);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.moveTo(centerX,0);
            ctx.lineTo(centerX,500);
            ctx.moveTo(0,centerY);
            ctx.lineTo(500,centerY);
            ctx.strokeStyle = "#cbd5e0";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }
        
        function drawCircle(cx,cy,r,color='#2c6e9e',lineWidth=2.5, fillAlpha=0.12){
            ctx.beginPath();
            ctx.arc(cx,cy,r,0,2*Math.PI);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
            ctx.fillStyle = color+Math.floor(fillAlpha*255).toString(16).padStart(2,'0');
            ctx.fill();
        }
        
        function drawPoint(x,y,color='#e34234',size=6,glow=false){
            ctx.beginPath();
            ctx.arc(x,y,size,0,2*Math.PI);
            if(glow){
                ctx.shadowColor = 'rgba(0,0,0,0.25)';
                ctx.shadowBlur = 6;
            }
            ctx.fillStyle = color;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(x,y,size+1.5,0,2*Math.PI);
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        
        function drawLine(x1,y1,x2,y2,color='#3b7b9e',dash=false,width=2){
            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            if(dash) ctx.setLineDash([6,8]);
            else ctx.setLineDash([]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawText(msg,x,y,color='#1f3b4c',size=14,weight='normal', bg=false){
            ctx.font = `${weight} ${size}px "Segoe UI", "Poppins"`;
            if(bg){
                ctx.shadowBlur=0;
                let metrics = ctx.measureText(msg);
                ctx.fillStyle = "rgba(255,255,240,0.7)";
                ctx.fillRect(x-4, y-size+2, metrics.width+8, size+4);
            }
            ctx.fillStyle = color;
            ctx.fillText(msg,x,y);
        }
        
        function angleToCoord(cx,cy,r,deg){
            let rad = deg * Math.PI/180;
            return {x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad)};
        }
        
        // ================= 圆的性质（简洁美观） =================
        function drawCircleProperties() {
            drawGrid();
            let r = state.radius;
            // 主圆 柔和半透明填充
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, 2*Math.PI);
            ctx.fillStyle = "#eef4ffaa";
            ctx.fill();
            ctx.strokeStyle = "#3a7ca5";
            ctx.lineWidth = 2.8;
            ctx.stroke();
            
            // 圆心: 大红点 + 标注
            drawPoint(centerX, centerY, '#e63946', 9, true);
            drawText("圆心 O", centerX+14, centerY-6, '#c7254e', 14, 'bold', true);
            
            // 一条半径 (水平向右)
            let radiusEnd = {x: centerX + r, y: centerY};
            drawLine(centerX, centerY, radiusEnd.x, radiusEnd.y, '#e67e22', false, 2.2);
            drawText(`半径 r = ${r}`, centerX + r/2 - 12, centerY-8, '#b85c1a', 12, 'bold', true);
            
            // 直径 (竖直方向) 展示直径概念
            let top = {x: centerX, y: centerY - r};
            let bottom = {x: centerX, y: centerY + r};
            drawLine(top.x, top.y, bottom.x, bottom.y, '#2a9d8f', true, 2);
            drawText(`直径 = ${2*r}`, centerX+8, centerY - r - 6, '#2a9d8f', 12, 'bold');
            
            // 另一条半径 135° 展示半径都相等
            let r2Point = angleToCoord(centerX, centerY, r, 135);
            drawLine(centerX, centerY, r2Point.x, r2Point.y, '#e67e22', false, 1.8);
            drawText(`r = ${r}`, r2Point.x-20, r2Point.y-8, '#b85c1a', 11);
            
            // 小圆点装饰，表示圆上的点
            let dotAngles = [45, 200, 300];
            dotAngles.forEach(deg => {
                let pt = angleToCoord(centerX, centerY, r, deg);
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 3, 0, 2*Math.PI);
                ctx.fillStyle = "#ffb347";
                ctx.fill();
            });
            
            // 计算公式卡片
            let circumference = (2*Math.PI*r).toFixed(2);
            let area = (Math.PI*r*r).toFixed(2);
            drawText(`📐 周长 C = 2πr ≈ ${circumference}`, 30, 50, '#1f4970', 13);
            drawText(`🗂️ 面积 S = πr² ≈ ${area}`, 30, 80, '#1f4970', 13);
            drawText(`✨ 所有半径相等 | 直径 = 2r`, 30, 470, '#b45309', 12);
        }
        
        // ================= 圆周角定理 =================
        function drawAngleTheorem() {
            drawGrid();
            let r = 150;
            let Adeg = state.fixedA;
            let Bdeg = state.fixedB;
            let Cdeg = state.angleC;
            let A = angleToCoord(centerX,centerY,r, Adeg);
            let B = angleToCoord(centerX,centerY,r, Bdeg);
            let C = angleToCoord(centerX,centerY,r, Cdeg);
            drawCircle(centerX, centerY, r, '#2c6e9e', 2.5, 0.1);
            drawPoint(A.x,A.y,'#d45a2b',6);
            drawPoint(B.x,B.y,'#d45a2b',6);
            drawPoint(C.x,C.y,'#2e8b57',6);
            drawText("A", A.x-12, A.y-6);
            drawText("B", B.x+6, B.y-6);
            drawText("C", C.x+6, C.y+4);
            let angleAOB = Math.abs(Adeg - Bdeg);
            if(angleAOB > 180) angleAOB = 360-angleAOB;
            let angleACB = angleAOB / 2;
            drawLine(centerX,centerY,A.x,A.y,'#4a6fa5');
            drawLine(centerX,centerY,B.x,B.y,'#4a6fa5');
            drawLine(A.x,A.y,C.x,C.y,'#588157');
            drawLine(B.x,B.y,C.x,C.y,'#588157');
            drawText(`圆心角 ∠AOB = ${angleAOB.toFixed(1)}°`, 30, 50, '#1e4663',14);
            drawText(`圆周角 ∠ACB = ${angleACB.toFixed(1)}°`, 30, 80, '#1e4663',14);
            drawText(`⭐ 定理: 同弧所对圆周角 = 圆心角的一半`, 30, 470, '#b45309',13);
            let midAngle = (Adeg+Bdeg)/2;
            let midArc = angleToCoord(centerX,centerY,r+12, midAngle);
            drawText("⌒AB", midArc.x-12, midArc.y-8, '#e67e22',12);
        }
        
        // ================= 切线性质判定 =================
        function drawTangent() {
            drawGrid();
            let r = 110;
            let dist = Math.min(Math.max(state.tangentDist, r+5), 280);
            let angleRad = state.tangentAngle * Math.PI/180;
            let px = centerX + dist * Math.cos(angleRad);
            let py = centerY + dist * Math.sin(angleRad);
            drawCircle(centerX, centerY, r, '#2c6e9e', 2.5, 0.1);
            drawPoint(px, py, '#d35400', 7);
            drawText("P", px+8, py-4);
            let d = Math.hypot(px-centerX, py-centerY);
            if(d > r) {
                let baseAng = Math.atan2(py-centerY, px-centerX);
                let delta = Math.acos(r/d);
                let ang1 = baseAng + delta;
                let ang2 = baseAng - delta;
                let t1 = {x: centerX + r*Math.cos(ang1), y: centerY + r*Math.sin(ang1)};
                let t2 = {x: centerX + r*Math.cos(ang2), y: centerY + r*Math.sin(ang2)};
                drawLine(px, py, t1.x, t1.y, '#e67e22', false, 2);
                drawLine(px, py, t2.x, t2.y, '#e67e22', false, 2);
                drawPoint(t1.x, t1.y, '#2c9e6e',5);
                drawPoint(t2.x, t2.y, '#2c9e6e',5);
                drawLine(centerX, centerY, t1.x, t1.y, '#aaa', true);
                drawLine(centerX, centerY, t2.x, t2.y, '#aaa', true);
                drawText("切点", t1.x-12, t1.y-6);
                drawText("切点", t2.x+4, t2.y-6);
                drawText(`切线长 = ${Math.sqrt(d*d - r*r).toFixed(2)}`, 30, 60, '#1e4663',13);
            } else {
                drawText("⚠️ 点P在圆内或圆上，请增大距离", 30, 60, '#c7254e',13);
            }
            drawText(`性质: 半径⊥切线 | 切线长相等`, 30, 470, '#2c6e9e',12);
            drawLine(centerX, centerY, px, py, '#4a6fa5', true);
            drawText(`OP距离 = ${d.toFixed(1)}`, 30, 90, '#1f4970',13);
        }
        
        // ================= 圆与圆位置关系（增强相切/内含高亮）=================
        function drawCirclesRelation() {
            drawGrid();
            let rA = Math.min(state.r1, 180);
            let rB = Math.min(state.r2, 160);
            let offsetX = state.center2Offset;
            let cx2 = centerX + offsetX;
            let cy2 = centerY;
            let d = Math.abs(offsetX);
            
            // 绘制第一个圆 (蓝色)
            ctx.beginPath();
            ctx.arc(centerX, centerY, rA, 0, 2*Math.PI);
            ctx.fillStyle = "#3c78a0aa";
            ctx.fill();
            ctx.strokeStyle = "#3c78a0";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            // 绘制第二个圆 (橙色)
            ctx.beginPath();
            ctx.arc(cx2, cy2, rB, 0, 2*Math.PI);
            ctx.fillStyle = "#b97f44aa";
            ctx.fill();
            ctx.strokeStyle = "#b97f44";
            ctx.stroke();
            
            drawPoint(centerX, centerY, '#2c5282',5);
            drawPoint(cx2, cy2, '#b45f2b',5);
            drawText("O₁", centerX+8, centerY-6, '#2c5282');
            drawText("O₂", cx2+8, cy2-6, '#b45f2b');
            
            // 位置关系判定
            let relation = "";
            let isSpecial = false;
            const eps = 1.5;
            if(d > rA + rB + 0.5) relation = "外离";
            else if(Math.abs(d - (rA+rB)) <= eps) { relation = "外切 ✨"; isSpecial = true; }
            else if(Math.abs(d - Math.abs(rA-rB)) <= eps) { relation = "内切 ✨"; isSpecial = true; }
            else if(d < Math.abs(rA - rB) - 0.5) relation = "内含 (包含)";
            else if(d < rA+rB && d > Math.abs(rA-rB)) relation = "相交";
            else if(Math.abs(d - Math.abs(rA-rB)) < 0.1 && rA !== rB) relation = "内切 ✨";
            else relation = "特殊";
            
            // 高亮相切时 添加发光效果
            if(isSpecial){
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = "gold";
                ctx.beginPath();
                ctx.arc(centerX, centerY, rA, 0, 2*Math.PI);
                ctx.strokeStyle = "#ffb347";
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx2, cy2, rB, 0, 2*Math.PI);
                ctx.stroke();
                ctx.restore();
            }
            
            drawText(`📌 圆心距 d = ${d.toFixed(1)}`, 30, 50, '#1f4970',14);
            drawText(`圆O₁半径 = ${rA}`, 30, 80, '#1f4970',13);
            drawText(`圆O₂半径 = ${rB}`, 30, 105, '#1f4970',13);
            let relColor = isSpecial ? "#d97706" : "#c4450c";
            drawText(`位置关系: ${relation}`, 30, 140, relColor, 16, 'bold');
            drawLine(centerX,centerY,cx2,cy2,'#6c8faa',true);
            
            // 额外提示内含情况
            if(relation.includes("内含")){
                drawText("⚡ 小圆完全在大圆内部", centerX-70, centerY-80, '#c4450c',12);
            }
        }
        
        // ================= 扇形与弧长 =================
        function drawSector() {
            drawGrid();
            let r = state.sectorRadius;
            let angle = state.sectorAngle;
            let startRad = -Math.PI/2;
            let endRad = startRad + angle * Math.PI/180;
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, startRad, endRad);
            ctx.lineTo(centerX, centerY);
            ctx.fillStyle = "#f9e0a0dd";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, startRad, endRad);
            ctx.strokeStyle = '#c97e3a';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            drawCircle(centerX, centerY, r, '#3f729b', 2, 0.05);
            let arcLength = (angle * Math.PI / 180) * r;
            let area = (angle / 360) * Math.PI * r * r;
            drawText(`圆心角 θ = ${angle}°`, 30, 50, '#1f4970',14);
            drawText(`弧长 L = ${arcLength.toFixed(2)}`, 30, 80, '#1f4970',14);
            drawText(`扇形面积 = ${area.toFixed(2)}`, 30, 110, '#1f4970',14);
            drawText("🍕 扇形区域", centerX+20, centerY-30, '#b45f2b',13);
            let radialX = angleToCoord(centerX,centerY,r, -90+angle).x;
            let radialY = angleToCoord(centerX,centerY,r, -90+angle).y;
            drawLine(centerX,centerY,radialX,radialY,'#b76e2e',true);
        }
        
        function renderByTab(){
            if(currentTab === "game") return;
            canvas.style.display = "block";
            gameContainer.style.display = "none";
            ctx.clearRect(0,0,500,500);
            switch(currentTab){
                case "prop": drawCircleProperties(); break;
                case "angle": drawAngleTheorem(); break;
                case "tangent": drawTangent(); break;
                case "circles": drawCirclesRelation(); break;
                case "sector": drawSector(); break;
                default: break;
            }
        }
        
        // 动态控制面板生成
        function buildControls(){
            const panel = document.getElementById('dynamicControls');
            if(currentTab === "game"){
                panel.innerHTML = `<div style="text-align:center; padding:12px;">🎮 游戏已开启，右侧开始挑战！</div>`;
                return;
            }
            let html = '';
            if(currentTab === "prop"){
                html = `<div class="ctrl-group"><label>🔘 半径调节: ${state.radius}</label>
                <input type="range" id="radiusSlider" min="40" max="200" step="1" value="${state.radius}">
                <div class="value-display">直径:${2*state.radius} | 周长≈${(2*Math.PI*state.radius).toFixed(2)} | 面积≈${(Math.PI*state.radius*state.radius).toFixed(2)}</div></div>
                <div class="theorem-note">⭐ 圆的性质: 半径都相等，直径=2r，周长C=2πr，面积S=πr²。图中显示多条半径长度相同，圆心明显。</div>`;
            } else if(currentTab === "angle"){
                html = `<div class="ctrl-group"><label>🎯 动点C角度: ${state.angleC}°</label>
                <input type="range" id="angleCSlider" min="0" max="360" step="1" value="${state.angleC}"></div>
                <div class="theorem-note">📐 圆周角定理: 同弧所对的圆周角是圆心角的一半。拖动点C，角ACB始终等于∠AOB/2</div>`;
            } else if(currentTab === "tangent"){
                html = `<div class="ctrl-group"><label>📍 点P距离圆心距离: ${state.tangentDist}</label>
                <input type="range" id="tangentDistSlider" min="75" max="280" step="2" value="${state.tangentDist}"></div>
                <div class="ctrl-group"><label>📐 方向角度: ${state.tangentAngle}°</label>
                <input type="range" id="tangentAngleSlider" min="0" max="360" step="2" value="${state.tangentAngle}"></div>
                <div class="theorem-note">✂️ 切线性质: 过圆外一点引两条切线，切线长相等，切线与半径垂直。</div>`;
            } else if(currentTab === "circles"){
                html = `<div class="ctrl-group"><label>🔵 圆O₁半径: ${state.r1}</label><input type="range" id="r1Slider" min="30" max="150" value="${state.r1}"></div>
                <div class="ctrl-group"><label>🟠 圆O₂半径: ${state.r2}</label><input type="range" id="r2Slider" min="30" max="150" value="${state.r2}"></div>
                <div class="ctrl-group"><label>↔️ 圆心距(水平偏移): ${state.center2Offset}</label><input type="range" id="offsetSlider" min="0" max="300" step="2" value="${state.center2Offset}"></div>
                <div class="theorem-note">📖 圆与圆位置: 外离、外切、相交、内切、内含(包含) 由圆心距d与半径和/差决定。相切时会有高亮✨</div>`;
            } else if(currentTab === "sector"){
                html = `<div class="ctrl-group"><label>🍕 扇形圆心角: ${state.sectorAngle}°</label>
                <input type="range" id="sectorAngleSlider" min="0" max="360" step="1" value="${state.sectorAngle}"></div>
                <div class="ctrl-group"><label>📏 半径: ${state.sectorRadius}</label>
                <input type="range" id="sectorRadiusSlider" min="50" max="200" step="2" value="${state.sectorRadius}"></div>
                <div class="theorem-note">弧长 L = nπr/180 , 扇形面积 = nπr²/360 </div>`;
            }
            panel.innerHTML = html;
            if(currentTab === "prop"){
                document.getElementById('radiusSlider')?.addEventListener('input',(e)=>{
                    state.radius = parseInt(e.target.value);
                    renderByTab();
                    buildControls();
                });
            } else if(currentTab === "angle"){
                document.getElementById('angleCSlider')?.addEventListener('input',(e)=>{
                    state.angleC = parseInt(e.target.value);
                    renderByTab();
                    buildControls();
                });
            } else if(currentTab === "tangent"){
                document.getElementById('tangentDistSlider')?.addEventListener('input',(e)=>{
                    state.tangentDist = parseInt(e.target.value);
                    renderByTab();
                    buildControls();
                });
                document.getElementById('tangentAngleSlider')?.addEventListener('input',(e)=>{
                    state.tangentAngle = parseInt(e.target.value);
                    renderByTab();
                    buildControls();
                });
            } else if(currentTab === "circles"){
                document.getElementById('r1Slider')?.addEventListener('input',(e)=>{
                    state.r1 = parseInt(e.target.value);
                    renderByTab(); buildControls();
                });
                document.getElementById('r2Slider')?.addEventListener('input',(e)=>{
                    state.r2 = parseInt(e.target.value);
                    renderByTab(); buildControls();
                });
                document.getElementById('offsetSlider')?.addEventListener('input',(e)=>{
                    state.center2Offset = parseInt(e.target.value);
                    renderByTab(); buildControls();
                });
            } else if(currentTab === "sector"){
                document.getElementById('sectorAngleSlider')?.addEventListener('input',(e)=>{
                    state.sectorAngle = parseInt(e.target.value);
                    renderByTab(); buildControls();
                });
                document.getElementById('sectorRadiusSlider')?.addEventListener('input',(e)=>{
                    state.sectorRadius = parseInt(e.target.value);
                    renderByTab(); buildControls();
                });
            }
        }
        
        // ---------- 游戏模块（10题，答错不扣分，时间与题目双重结束）----------
        let gameActive = false;
        let gameTimer = null;
        let gameScore = 0;
        let timeLeft = 30;
        let currentQuestionIndex = 0;
        let totalQuestions = 10;
        let gameQuestions = [];
        
        const fullQuestionBank = [
            { text: "圆的周长公式是？", options: ["πr²", "2πr", "πd²", "2πd"], answer: 1 },
            { text: "圆周角定理: 同弧所对圆周角是圆心角的？", options: ["2倍", "1/2", "相等", "3倍"], answer: 1 },
            { text: "过圆外一点可以作圆的几条切线？", options: ["1条", "2条", "无数条", "0条"], answer: 1 },
            { text: "圆内接四边形对角性质？", options: ["互补", "相等", "互余", "没关系"], answer: 0 },
            { text: "半径为3，圆心角60°的扇形面积？", options: ["1.5π", "3π", "π", "2π"], answer: 0 },
            { text: "两圆半径5和3，圆心距4，位置关系是？", options: ["外离", "相交", "内切", "内含"], answer: 1 },
            { text: "切线性质: 切线与过切点的半径", options: ["平行", "垂直", "成45°", "无关系"], answer: 1 },
            { text: "直径所对的圆周角是？", options: ["锐角", "直角", "钝角", "平角"], answer: 1 },
            { text: "弧长公式(角度制)？", options: ["nπr/180", "nπr²/360", "2πr", "πr"], answer: 0 },
            { text: "圆是轴对称图形，对称轴有？", options: ["1条", "2条", "无数条", "没有"], answer: 2 },
            { text: "半径为4的圆，圆心角90°的弧长是？", options: ["π", "2π", "3π", "4π"], answer: 1 },
            { text: "已知圆O半径为5，点P到圆心距离为3，则点P与圆的位置关系？", options: ["圆内", "圆上", "圆外", "无法确定"], answer: 0 }
        ];
        
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function initGame() {
            let shuffledBank = shuffleArray([...fullQuestionBank]);
            gameQuestions = shuffledBank.slice(0, totalQuestions);
            currentQuestionIndex = 0;
            gameScore = 0;
            timeLeft = 30;
            gameActive = true;
            if(gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                if(!gameActive) return;
                if(timeLeft <= 1) {
                    timeLeft = 0;
                    updateGameUI();
                    endGame("⏰ 时间用完了！");
                } else {
                    timeLeft--;
                    updateGameUI();
                }
            }, 1000);
            updateGameUI();
            renderCurrentQuestion();
        }
        
        function renderCurrentQuestion() {
            if(!gameActive) return;
            if(currentQuestionIndex >= gameQuestions.length) {
                endGame("🎉 恭喜你完成了所有题目！");
                return;
            }
            const q = gameQuestions[currentQuestionIndex];
            const questionDiv = document.querySelector('.question-text');
            const optsDiv = document.querySelector('.options');
            if(questionDiv) questionDiv.innerText = q.text;
            if(optsDiv) {
                let btnsHtml = '';
                q.options.forEach((opt, idx) => {
                    btnsHtml += `<button class="opt-btn" data-opt="${idx}">${opt}</button>`;
                });
                optsDiv.innerHTML = btnsHtml;
                document.querySelectorAll('.opt-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if(!gameActive) return;
                        let selected = parseInt(btn.dataset.opt);
                        if(selected === q.answer) {
                            gameScore += 10;
                        } // 答错不加分也不减分
                        updateGameUI();
                        currentQuestionIndex++;
                        if(currentQuestionIndex >= gameQuestions.length) {
                            endGame("🎉 恭喜完成所有题目！");
                        } else {
                            renderCurrentQuestion();
                        }
                    });
                });
            }
        }
        
        function updateGameUI() {
            const scoreSpan = document.getElementById('gameScoreSpan');
            const timeSpan = document.getElementById('gameTimeSpan');
            const progressSpan = document.getElementById('gameProgressSpan');
            if(scoreSpan) scoreSpan.innerText = gameScore;
            if(timeSpan) timeSpan.innerText = timeLeft;
            if(progressSpan) progressSpan.innerText = `${currentQuestionIndex}/${totalQuestions}`;
        }
        
        function endGame(message) {
            if(!gameActive) return;
            gameActive = false;
            if(gameTimer) clearInterval(gameTimer);
            gameTimer = null;
            const questionDiv = document.querySelector('.question-text');
            if(questionDiv) questionDiv.innerText = `${message}  最终得分: ${gameScore} 分 🎯`;
            const optsDiv = document.querySelector('.options');
            if(optsDiv) optsDiv.innerHTML = '';
        }
        
        function buildGameUI() {
            gameContainer.style.display = "flex";
            canvas.style.display = "none";
            gameContainer.innerHTML = `
                <div style="padding:20px; display:flex; flex-direction:column; height:100%;">
                    <div class="game-stats">
                        <span>⭐ 得分: <span id="gameScoreSpan">0</span></span>
                        <span>📋 进度: <span id="gameProgressSpan">0/${totalQuestions}</span></span>
                        <span>⏱️ 剩余: <span id="gameTimeSpan">30</span> 秒</span>
                    </div>
                    <div class="question-box">
                        <div class="question-text" style="font-weight:bold; margin-bottom:16px;">点击开始挑战！</div>
                        <div class="options"></div>
                    </div>
                    <button id="startGameBtn" class="game-btn">🚀 开始30秒 · 10题挑战</button>
                    <button id="resetGameBtn" class="game-btn" style="background:#6c757d;">🔄 重置游戏</button>
                    <div class="theorem-note" style="margin-top:12px;">💡 规则: 限时30秒，共10道题，答对+10分，答错不扣分。快问快答！</div>
                </div>
            `;
            document.getElementById('startGameBtn').addEventListener('click', () => {
                if(gameTimer) clearInterval(gameTimer);
                initGame();
            });
            document.getElementById('resetGameBtn').addEventListener('click', () => {
                if(gameTimer) clearInterval(gameTimer);
                gameActive = false;
                gameScore = 0; timeLeft = 30; currentQuestionIndex = 0;
                updateGameUI();
                const qDiv = document.querySelector('.question-text');
                if(qDiv) qDiv.innerText = "点击开始挑战！";
                const optsDiv = document.querySelector('.options');
                if(optsDiv) optsDiv.innerHTML = '';
            });
        }
        
        function setTab(tabId){
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn=>{
                if(btn.dataset.tab === tabId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            if(tabId === "game"){
                buildGameUI();
                if(gameTimer) clearInterval(gameTimer);
                gameActive = false;
            } else {
                canvas.style.display = "block";
                gameContainer.style.display = "none";
                if(gameTimer){ clearInterval(gameTimer); gameTimer=null;}
                renderByTab();
            }
            buildControls();
        }
        
        document.querySelectorAll('.tab-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                setTab(btn.dataset.tab);
            });
        });
        setTab("prop");
    })();
</script>
</body>
</html>
